version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clearcapture
      POSTGRES_USER: clearcapture
      POSTGRES_PASSWORD: clearcapture_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearcapture"]
      interval: 5s
      timeout: 5s
      retries: 5

  classifier:
    build: ./classifier
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=clearcapture;Username=clearcapture;Password=clearcapture_secret"
      ClassifierUrl: "http://classifier:8000"
    depends_on:
      postgres:
        condition: service_healthy
      classifier:
        condition: service_started
    volumes:
      - uploads:/app/Uploads

volumes:
  postgres_data:
  uploads: