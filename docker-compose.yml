version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: clearcapture
      POSTGRES_USER: clearcapture
      POSTGRES_PASSWORD: clearcapture_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clearcapture"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=clearcapture;Username=clearcapture;Password=clearcapture_secret"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: